<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Bursa Dart Challenge — Canlı İzleme</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0f;--bg1:#1a1a1a;--bg2:#222;--card:#1e1e1e;
  --border:#2a2a2a;--border2:#333;
  --text:#e8e8e8;--text2:#888;
  --accent:#e03030;--accent2:#ff5555;--accent3:#e07030;
  --green:#22c55e;--yellow:#f59e0b;--blue:#2070c8;
}
body{font-family:'Rajdhani',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* Header */
.app-header{background:#111;border-bottom:3px solid var(--accent);padding:.5rem 1rem;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;gap:.5rem}
.logo-row{display:flex;align-items:center;gap:.6rem}
.logo-row img{width:38px;height:38px;object-fit:contain}
.app-title{font-size:1.2rem;font-weight:900;letter-spacing:.05em;line-height:1}
.app-sub{font-size:.6rem;color:var(--text2);letter-spacing:.12em;text-transform:uppercase}
.live-badge{padding:.2rem .6rem;border-radius:3px;font-size:.65rem;font-weight:700;letter-spacing:.06em}
.live-badge.online{background:var(--accent);color:#fff;animation:blink 2s infinite}
.live-badge.offline{background:#333;color:#888}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.5}}

/* Nav */
nav{background:#111;border-bottom:1px solid var(--border);display:flex;overflow-x:auto;padding:0 .5rem}
.nav-tab{padding:.6rem 1rem;font-size:.78rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  cursor:pointer;border-bottom:2px solid transparent;color:var(--text2);white-space:nowrap;transition:all .15s}
.nav-tab.active{color:var(--accent);border-color:var(--accent)}
.nav-tab:hover:not(.active){color:var(--text)}

/* Main */
main{padding:.8rem;max-width:1200px;margin:0 auto}
.view{display:none}.view.active{display:block}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:6px;margin-bottom:.9rem;overflow:hidden}
.card-header{padding:.55rem .85rem;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--accent)}

/* Groups grid */
.groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:.9rem}

/* Standings */
.st-table{width:100%;border-collapse:collapse;font-size:.8rem}
.st-table th{font-size:.62rem;letter-spacing:.07em;text-transform:uppercase;color:var(--text2);
  padding:.35rem .6rem;text-align:left;border-bottom:1px solid var(--border)}
.st-table td{padding:.35rem .6rem;border-bottom:1px solid var(--border);vertical-align:middle}
.st-table tr:last-child td{border-bottom:none}
.st-table tr.adv td{color:var(--green)}
.rank{color:var(--text2);font-size:.7rem;min-width:1.2rem}

/* Match list */
.match-item{display:grid;align-items:center;gap:.35rem;padding:.45rem .7rem;
  border-bottom:1px solid var(--border);font-size:.8rem}
.match-item:last-child{border-bottom:none}
.match-item.done{border-left:3px solid var(--green)}
.match-item.live{border-left:3px solid var(--yellow)}
.match-score{font-weight:700;font-size:.9rem;text-align:center;min-width:3rem;color:var(--accent)}
.match-score.vs{color:var(--text2);font-size:.72rem;font-weight:400}
.match-score.done{color:var(--green)}
.p1{text-align:right;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.p2{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.status-dot.idle{background:#444}
.status-dot.live{background:var(--yellow);animation:blink .8s infinite}
.status-dot.done{background:var(--green)}
.board-badge{font-size:.62rem;font-weight:700;color:#fff;padding:.1rem .3rem;border-radius:2px;white-space:nowrap}

/* Bracket */
.bracket-scroll{overflow-x:auto;padding:.5rem 0}
.bracket-wrap{display:flex;gap:1.2rem;align-items:flex-start;min-width:max-content;padding:.5rem}
.round-col{display:flex;flex-direction:column;gap:.5rem;width:170px;flex-shrink:0}
.round-label{font-size:.62rem;color:var(--accent);letter-spacing:.1em;text-transform:uppercase;
  text-align:center;padding-bottom:.3rem;font-weight:700;border-bottom:1px solid var(--border)}
.round-label.losers{color:var(--accent3)}
.bm{background:var(--bg1);border:1px solid var(--border);border-radius:4px;overflow:hidden}
.bm.active-match{border-color:var(--yellow);box-shadow:0 0 0 1px rgba(245,158,11,.2)}
.bm.done-match{border-color:var(--green);box-shadow:0 0 0 1px rgba(34,197,94,.15)}
.bm-status{font-size:.6rem;color:var(--text2);padding:.18rem .5rem;background:var(--bg)}
.bm-player{padding:.3rem .5rem;font-size:.78rem;font-weight:600;display:flex;align-items:center;gap:.3rem;
  border-bottom:1px solid var(--border)}
.bm-player:last-of-type{border-bottom:none}
.bm-player.winner{color:var(--accent);background:rgba(224,48,48,.07)}
.bm-player .arrow{color:var(--accent);font-size:.65rem;margin-left:auto}

/* Stats */
.stats-table{width:100%;border-collapse:collapse;font-size:.78rem}
.stats-table th{font-size:.6rem;letter-spacing:.07em;text-transform:uppercase;color:var(--text2);
  padding:.35rem .6rem;text-align:left;border-bottom:1px solid var(--border2)}
.stats-table td{padding:.35rem .6rem;border-bottom:1px solid var(--border)}
.stats-table tr:last-child td{border-bottom:none}

/* Champion */
.champ{text-align:center;padding:1.5rem 1rem;background:linear-gradient(135deg,#1a1a0a,#2a1a00);
  border:2px solid var(--accent3);border-radius:8px;margin-bottom:1rem}
.champ-name{font-size:2rem;font-weight:900;color:var(--accent3);letter-spacing:.05em}

/* Empty state */
.empty{text-align:center;padding:2.5rem 1rem;color:var(--text2)}
.empty .icon{font-size:2rem;margin-bottom:.5rem}

/* Stats mode tabs */
.mode-tabs{display:flex;gap:.4rem;margin-bottom:.9rem;flex-wrap:wrap}
.mode-tab{padding:.3rem .75rem;font-size:.75rem;font-weight:700;letter-spacing:.05em;
  border:1px solid var(--border2);border-radius:4px;cursor:pointer;color:var(--text2);background:var(--bg1)}
.mode-tab.active{background:var(--accent);border-color:var(--accent);color:#fff}

:root.light{
  --bg:#f5f5f5;--bg1:#fff;--bg2:#eee;--card:#fff;
  --border:#ddd;--border2:#ccc;
  --text:#111;--text2:#666;
}
:root.light .app-header{background:#fff}
:root.light nav{background:#fff}
</style>
</head>

  <div id="view-stats" class="view"><div class="empty"><div class="icon">📡</div><p>Yayın bekleniyor...</p></div></div>
</main>

<script>
var firebaseConfig = {
  apiKey: "AIzaSyCvovoMBThfpP3VZnzrlhlWrbdKk8cwJ-s",
  authDomain: "bursa-dart-challenge.firebaseapp.com",
  databaseURL: "https://bursa-dart-challenge-default-rtdb.firebaseio.com",
  projectId: "bursa-dart-challenge",
  storageBucket: "bursa-dart-challenge.firebasestorage.app",
  messagingSenderId: "601796841343",
  appId: "1:601796841343:web:bdde88f976cf803ed5d44a"
};

var _data = null;
var _tab = 'groups';
var _statsMode = 'groups';

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function switchTab(t) {
  _tab = t;
  document.querySelectorAll('.nav-tab').forEach(function(el){ el.classList.remove('active'); });
  document.querySelectorAll('.view').forEach(function(el){ el.classList.remove('active'); });
  document.getElementById('tab-'+t).classList.add('active');
  document.getElementById('view-'+t).classList.add('active');
}

window.addEventListener('load', function() {
  if (typeof firebase === 'undefined') {
    document.getElementById('live-badge').textContent = '❌ Firebase yüklenemedi';
    return;
  }
  firebase.initializeApp(firebaseConfig);
  var db = firebase.database();
  db.ref('tournament').on('value', function(snap) {
    _data = snap.val();
    var badge = document.getElementById('live-badge');
    if (_data) {
      badge.className = 'live-badge online';
      badge.textContent = '🔴 CANLI';
      renderAll();
    } else {
      badge.className = 'live-badge offline';
      badge.textContent = '⏳ Yayın yok';
    }
  });
});

function renderAll() {
  renderGroups();
  renderBracket();
  renderStats();
}

/* ─── GROUPS ─── */
function renderGroups() {
  var el = document.getElementById('view-groups');
  var d = _data;
  if (!d || !d.groups || !d.groups.length) {
    if (d && d.phase === 'bracket') {
      el.innerHTML = '<div class="empty"><div class="icon">⊡</div><p>Turnuva başladı</p></div>';
    } else {
      el.innerHTML = '<div class="empty"><div class="icon">⏳</div><p>Gruplar henüz oluşturulmadı</p></div>';
    }
    return;
  }
  var adv = (d.config && d.config.advancePerGroup) || 1;
  var boardColors = ['#e03030','#e07030','#2070c8','#208050','#8030c0','#008090','#c04060','#607080'];
  var html = '<div class="groups-grid">';
  d.groups.forEach(function(g) {
    var st = {};
    (g.players||[]).forEach(function(p){ st[p]={p:p,w:0,l:0,lw:0,ll:0}; });
    (g.matches||[]).forEach(function(m){
      if (!m.winner) return;
      [m.player1, m.player2].forEach(function(p){
        if (!st[p]) return;
        var won = m.winner === p;
        if (won){ st[p].w++; st[p].lw += (p===m.player1?m.score1:m.score2)||0; st[p].ll += (p===m.player1?m.score2:m.score1)||0; }
        else { st[p].l++; st[p].lw += (p===m.player1?m.score1:m.score2)||0; st[p].ll += (p===m.player1?m.score2:m.score1)||0; }
      });
    });
    var sorted = Object.values(st).sort(function(a,b){ return b.w!==a.w?b.w-a.w:b.lw!==a.lw?b.lw-a.lw:0; });
    var total = (g.matches||[]).length;
    var played = (g.matches||[]).filter(function(m){return m.winner;}).length;

    html += '<div class="card">';
    html += '<div class="card-header"><div class="card-title">'+esc(g.name)+'</div>';
    html += '<span style="font-size:.7rem;color:var(--text2)">'+played+'/'+total+' maç</span></div>';
    // Standings
    html += '<table class="st-table"><thead><tr><th>#</th><th>Oyuncu</th><th>G</th><th>M</th><th>AL</th><th>VL</th></tr></thead><tbody>';
    sorted.forEach(function(s,i){
      var cls = i<adv?' class="adv"':'';
      html += '<tr'+cls+'><td class="rank">'+(i+1)+'</td><td>'+esc(s.p)+'</td><td>'+s.w+'</td><td>'+s.l+'</td><td>'+s.lw+'</td><td>'+s.ll+'</td></tr>';
    });
    html += '</tbody></table>';
    // Matches
    html += '<div>';
    (g.matches||[]).forEach(function(m){
      var done = !!m.winner;
      var live = !done && (m.active===true||m.active===1||m.active==='1');
      var dotCls = done?'done':live?'live':'idle';
      var itemCls = done?'done':live?'live':'';
      var score = done
        ? '<span class="match-score done">'+m.score1+' – '+m.score2+'</span>'
        : live ? '<span class="match-score" style="color:var(--yellow)">⚡</span>'
        : '<span class="match-score vs">vs</span>';
      var board = m.board ? '<span class="board-badge" style="background:'+boardColors[(m.board-1)%boardColors.length]+'">B'+m.board+'</span>' : '';
      var ref = m.referee ? '<span style="font-size:.6rem;color:var(--text2)">⚖ '+esc(m.referee)+'</span>' : '';
      html += '<div class="match-item '+itemCls+'" style="grid-template-columns:8px auto auto 1fr auto 1fr auto">';
      html += '<span class="status-dot '+dotCls+'"></span>';
      html += board;
      html += '<span class="p1">'+esc(m.player1||'?')+'</span>';
      html += score;
      html += '<span class="p2">'+esc(m.player2||'?')+'</span>';
      html += ref;
      html += '</div>';
    });
    html += '</div></div>';
  });
  html += '</div>';
  el.innerHTML = html;
}

/* ─── BRACKET ─── */
function renderBracket() {
  var el = document.getElementById('view-bracket');
  var d = _data;
  if (!d || !d.bracket) {
    el.innerHTML = '<div class="empty"><div class="icon">⏳</div><p>Turnuva henüz başlamadı</p></div>';
    return;
  }
  var html = '';
  if (d.champion) {
    html += '<div class="champ">🏆 ŞAMPİYON<div class="champ-name">'+esc(d.champion)+'</div></div>';
  }
  var br = d.bracket;
  html += '<div class="card"><div class="card-header"><div class="card-title">⊡ Turnuva Briketi</div>';
  html += '<span style="font-size:.7rem;color:var(--text2)">'+(d.config&&d.config.tournamentType==='double'?'Çift Eleme':'Tek Eleme')+'</span></div>';
  html += '<div class="bracket-scroll"><div class="bracket-wrap">';

  if (br.winners) {
    br.winners.forEach(function(round, ri) {
      var label = roundName(round.length, br.winners.length, ri);
      html += '<div class="round-col"><div class="round-label">'+label+'</div>';
      round.forEach(function(m){ html += bracketMatch(m); });
      html += '</div>';
    });
  }
  if (br.losers && br.losers.length) {
    br.losers.forEach(function(round, ri) {
      html += '<div class="round-col"><div class="round-label losers">K'+(ri+1)+'</div>';
      round.forEach(function(m){ html += bracketMatch(m); });
      html += '</div>';
    });
  }
  if (br.grandFinal) {
    html += '<div class="round-col"><div class="round-label">Final</div>'+bracketMatch(br.grandFinal)+'</div>';
  }
  if (br.grandFinalReset) {
    html += '<div class="round-col"><div class="round-label">Reset</div>'+bracketMatch(br.grandFinalReset)+'</div>';
  }
  if (br.thirdPlace) {
    html += '<div class="round-col"><div class="round-label" style="color:var(--text2)">3.lük</div>'+bracketMatch(br.thirdPlace)+'</div>';
  }
  html += '</div></div></div>';
  el.innerHTML = html;
}

function bracketMatch(m) {
  if (!m) return '';
  var p1 = m.player1||'?', p2 = m.player2||'?';
  if (p1==='BYE'&&p2==='BYE') return '';
  var done = !!m.winner;
  var live = !done && (m.active===true||m.active===1||m.active==='1');
  var cls = done?'done-match':live?'active-match':'';
  var statusTxt = done?('✔ '+m.score1+' – '+m.score2):live?'⚡ Oynanıyor':'—';
  var statusClr = done?'var(--green)':live?'var(--yellow)':'var(--text2)';
  var brd = m.board ? ' <span style="font-size:.58rem;background:var(--accent);color:#fff;padding:.04rem .28rem;border-radius:2px">B'+m.board+'</span>' : '';
  var ref = m.referee ? ' <span style="font-size:.58rem;color:var(--text2)">⚖ '+esc(m.referee)+'</span>' : '';
  return '<div class="bm '+cls+'">'+
    '<div class="bm-status" style="color:'+statusClr+'">'+statusTxt+brd+ref+'</div>'+
    '<div class="bm-player '+(m.winner===p1?'winner':'')+'">'+esc(p1)+(m.winner===p1?'<span class="arrow">▶</span>':'')+'</div>'+
    '<div class="bm-player '+(m.winner===p2?'winner':'')+'">'+esc(p2)+(m.winner===p2?'<span class="arrow">▶</span>':'')+'</div>'+
    '</div>';
}

function roundName(cnt, total, ri) {
  var fromEnd = total - ri;
  if (fromEnd===1) return 'Final';
  if (fromEnd===2) return 'Yarı Final';
  if (fromEnd===3) return 'Çeyrek Final';
  return 'Tur '+(ri+1);
}

/* ─── STATS ─── */
function renderStats() {
  var el = document.getElementById('view-stats');
  var d = _data;
  if (!d || !d.players || !d.players.length) {
    el.innerHTML = '<div class="empty"><div class="icon">📊</div><p>İstatistik yok</p></div>';
    return;
  }

  var hasGroups = d.groups && d.groups.length > 0;
  var hasBracket = d.bracket && d.phase === 'bracket';

  var tabs = '';
  if (hasGroups) tabs += '<div class="mode-tab" data-mode="groups" onclick="setStatsMode(this.dataset.mode)">Gruplar</div>';
  if (hasBracket) tabs += '<div class="mode-tab" data-mode="bracket" onclick="setStatsMode(this.dataset.mode)">Turnuva</div>';
  if (hasGroups && hasBracket) tabs += '<div class="mode-tab" data-mode="total" onclick="setStatsMode(this.dataset.mode)">Toplam</div>';

  var html = '<div class="mode-tabs">'+tabs+'</div>';

  var gm = [];
  if (hasGroups) d.groups.forEach(function(g){ (g.matches||[]).forEach(function(m){if(m.winner)gm.push(m);}); });

  var bm = [];
  if (hasBracket) collectBracketMatches(d.bracket, bm);

  var matches = [];
  if (_statsMode==='groups') matches = gm;
  else if (_statsMode==='bracket') matches = bm;
  else matches = gm.concat(bm);

  html += statsBlock(d.players, matches);
  el.innerHTML = html;
}

function setStatsMode(m) {
  _statsMode = m;
  renderStats();
  // Update active class on mode tabs
  document.querySelectorAll('.mode-tab[data-mode]').forEach(function(el) {
    el.classList.toggle('active', el.dataset.mode === m);
  });
}

function collectBracketMatches(br, arr) {
  if (!br) return;
  function addRound(rounds){ (rounds||[]).forEach(function(round){ (round||[]).forEach(function(m){ if(m&&m.winner)arr.push(m); }); }); }
  addRound(br.winners);
  addRound(br.losers);
  if (br.grandFinal && br.grandFinal.winner) arr.push(br.grandFinal);
  if (br.grandFinalReset && br.grandFinalReset.winner) arr.push(br.grandFinalReset);
  if (br.thirdPlace && br.thirdPlace.winner) arr.push(br.thirdPlace);
}

function statsBlock(players, matches) {
  var st = {};
  players.forEach(function(p){ st[p]={p:p,w:0,l:0,lw:0,ll:0,ok:0,okN:0,s180:0,ho:0}; });
  matches.forEach(function(m){
    var s1=st[m.player1], s2=st[m.player2];
    if (!s1||!s2) return;
    if (m.winner===m.player1){s1.w++;s2.l++;}else{s2.w++;s1.l++;}
    s1.lw+=(m.score1||0); s1.ll+=(m.score2||0);
    s2.lw+=(m.score2||0); s2.ll+=(m.score1||0);
    (m.legs||[]).forEach(function(leg){
      if (leg.p1Stats){if(leg.p1Stats.okSayisi>0){s1.ok+=leg.p1Stats.okSayisi;s1.okN++;}s1.s180+=leg.p1Stats.s180||0;if(leg.p1Stats.highOut>0)s1.ho=Math.max(s1.ho,leg.p1Stats.highOut);}
      if (leg.p2Stats){if(leg.p2Stats.okSayisi>0){s2.ok+=leg.p2Stats.okSayisi;s2.okN++;}s2.s180+=leg.p2Stats.s180||0;if(leg.p2Stats.highOut>0)s2.ho=Math.max(s2.ho,leg.p2Stats.highOut);}
    });
  });
  var sorted = Object.values(st).sort(function(a,b){ return b.w!==a.w?b.w-a.w:b.lw-a.lw; });
  var html = '<div class="card"><div style="overflow-x:auto"><table class="stats-table"><thead><tr>';
  html += '<th>#</th><th>Oyuncu</th><th>G</th><th>M</th><th>AL</th><th>VL</th><th>Ok Ort.</th><th>180</th><th>H.Out</th>';
  html += '</tr></thead><tbody>';
  sorted.forEach(function(s,i){
    var avg = s.okN>0 ? (s.okN*501/s.ok*3).toFixed(2) : '—';
    html += '<tr><td style="color:var(--accent);font-size:.72rem">'+(i+1)+'</td>';
    html += '<td style="font-weight:700">'+esc(s.p)+'</td>';
    html += '<td>'+s.w+'</td><td>'+s.l+'</td><td>'+s.lw+'</td><td>'+s.ll+'</td>';
    html += '<td style="color:var(--accent)">'+avg+'</td>';
    html += '<td style="color:var(--accent3)">'+(s.s180||'—')+'</td>';
    html += '<td style="color:var(--accent3)">'+(s.ho||'—')+'</td>';
    html += '</tr>';
  });
  html += '</tbody></table></div></div>';
  return html;
}

function toggleViewerTheme() {
  var root = document.documentElement;
  var btn = document.getElementById('theme-btn');
  if (root.classList.contains('light')) {
    root.classList.remove('light');
    btn.textContent = '\u{1F319}';
    localStorage.setItem('viewer-theme','dark');
  } else {
    root.classList.add('light');
    btn.textContent = '\u2600\uFE0F';
    localStorage.setItem('viewer-theme','light');
  }
}
(function(){
  if (localStorage.getItem('viewer-theme')==='light') {
    document.documentElement.classList.add('light');
    var btn = document.getElementById('theme-btn');
    if (btn) btn.textContent = '\u2600\uFE0F';
  }
})();
</script>
