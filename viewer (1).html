<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bursa Dart Challenge — Canlı İzleme</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0f;--bg1:#1a1a1a;--card:#1e1e1e;--border:#2a2a2a;--border2:#333;
  --text:#e8e8e8;--text2:#888;--accent:#e03030;--accent2:#ff5555;--accent3:#e07030;
  --green:#22c55e;--yellow:#f59e0b;
}
body{font-family:'Rajdhani',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:#111;border-bottom:3px solid var(--accent);padding:.6rem 1.2rem;
  display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo-area{display:flex;align-items:center;gap:.6rem}
.logo-area img{width:40px;height:40px;object-fit:contain}
.app-title{font-size:1.3rem;font-weight:900;letter-spacing:.05em;color:#fff}
.app-subtitle{font-size:.65rem;color:var(--text2);letter-spacing:.12em;text-transform:uppercase}
.live-badge{background:var(--accent);color:#fff;font-size:.65rem;font-weight:700;
  padding:.2rem .5rem;border-radius:3px;letter-spacing:.06em;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.offline-badge{background:#555;color:#aaa;font-size:.65rem;font-weight:700;
  padding:.2rem .5rem;border-radius:3px;letter-spacing:.06em}
nav{display:flex;gap:0;background:#111;border-bottom:1px solid var(--border);padding:0 1rem;overflow-x:auto}
.tab{padding:.65rem 1.2rem;font-size:.82rem;font-weight:700;letter-spacing:.06em;
  cursor:pointer;border-bottom:2px solid transparent;color:var(--text2);white-space:nowrap;
  text-transform:uppercase;transition:all .15s}
.tab.active{color:var(--accent);border-color:var(--accent)}
.tab:hover:not(.active){color:var(--text)}
main{padding:1rem;max-width:1200px;margin:0 auto}
.view{display:none}.view.active{display:block}
.card{background:var(--card);border:1px solid var(--border);border-radius:6px;margin-bottom:1rem;overflow:hidden}
.card-header{padding:.65rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:.78rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--accent)}
.groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem}
.standings-table{width:100%;border-collapse:collapse;font-size:.8rem}
.standings-table th{font-size:.62rem;letter-spacing:.08em;text-transform:uppercase;
  color:var(--text2);padding:.4rem .6rem;text-align:left;border-bottom:1px solid var(--border)}
.standings-table td{padding:.4rem .6rem;border-bottom:1px solid var(--border)}
.standings-table tr:last-child td{border-bottom:none}
.standings-table tr.advancing td{color:var(--green)}
.match-row{display:flex;align-items:center;gap:.4rem;padding:.4rem .7rem;
  border-bottom:1px solid var(--border);font-size:.82rem}
.match-row:last-child{border-bottom:none}
.match-row .p1{flex:1;text-align:right;font-weight:600}
.match-row .p2{flex:1;font-weight:600}
.match-score{min-width:3rem;text-align:center;font-weight:700;font-size:.9rem;color:var(--accent)}
.match-score.pending{color:var(--text2);font-size:.7rem}
.done{color:var(--green)}
.status-dot{width:7px;height:7px;border-radius:50%;background:#555;flex-shrink:0}
.status-dot.live{background:var(--yellow);animation:pulse 1s infinite}
.status-dot.done{background:var(--green)}
/* Bracket */
.bracket-wrap{overflow-x:auto;padding:.5rem}
.bracket{display:flex;gap:1.5rem;align-items:flex-start}
.round-col{display:flex;flex-direction:column;gap:.5rem;min-width:170px}
.round-label{font-size:.62rem;color:var(--accent);letter-spacing:.1em;text-transform:uppercase;
  text-align:center;margin-bottom:.3rem;font-weight:700}
.bm{background:var(--bg1);border:1px solid var(--border);border-radius:4px;overflow:hidden}
.bm-player{padding:.35rem .55rem;font-size:.78rem;font-weight:600;display:flex;align-items:center;gap:.4rem}
.bm-player.winner{color:var(--accent);background:rgba(224,48,48,.08)}
.bm-player span.seed{color:var(--text2);font-size:.62rem;min-width:.8rem}
.bm-divider{height:1px;background:var(--border)}
.bm-status{font-size:.62rem;color:var(--text2);padding:.2rem .55rem;background:var(--bg)}
/* Stats */
.stats-table{width:100%;border-collapse:collapse;font-size:.8rem}
.stats-table th{font-size:.62rem;letter-spacing:.08em;text-transform:uppercase;
  color:var(--text2);padding:.4rem .6rem;text-align:left;border-bottom:1px solid var(--border2)}
.stats-table td{padding:.4rem .6rem;border-bottom:1px solid var(--border)}
.champ-banner{text-align:center;padding:2rem 1rem;background:linear-gradient(135deg,#1a1a1a,#2a1a0a);
  border:2px solid var(--accent3);border-radius:8px;margin-bottom:1rem}
.champ-name{font-size:2rem;font-weight:900;color:var(--accent3);letter-spacing:.05em}
.waiting{text-align:center;padding:3rem 1rem;color:var(--text2);font-size:.9rem}
.waiting .icon{font-size:2.5rem;margin-bottom:.5rem}
</style>
</head>
<body>
<header>
  <div class="logo-area">
    <div>
      <div class="app-title">BURSA DART CHALLENGE</div>
      <div class="app-subtitle">Canlı İzleme</div>
    </div>
  </div>
  <div id="live-status" class="offline-badge">⏳ Bekleniyor</div>
</header>
<nav id="nav-tabs">
  <div class="tab active" onclick="switchTab('groups')" id="tab-groups">⊞ Gruplar</div>
  <div class="tab" onclick="switchTab('bracket')" id="tab-bracket">⊡ Turnuva</div>
  <div class="tab" onclick="switchTab('stats')" id="tab-stats">◫ İstatistikler</div>
</nav>
<main>
  <div id="view-groups" class="view active">
    <div id="groups-content"><div class="waiting"><div class="icon">📡</div><p>Yayın bekleniyor...</p></div></div>
  </div>
  <div id="view-bracket" class="view">
    <div id="bracket-content"><div class="waiting"><div class="icon">📡</div><p>Yayın bekleniyor...</p></div></div>
  </div>
  <div id="view-stats" class="view">
    <div id="stats-content"><div class="waiting"><div class="icon">📡</div><p>Yayın bekleniyor...</p></div></div>
  </div>
</main>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCvovoMBThfpP3VZnzrlhlWrbdKk8cwJ-s",
  authDomain: "bursa-dart-challenge.firebaseapp.com",
  databaseURL: "https://bursa-dart-challenge-default-rtdb.firebaseio.com",
  projectId: "bursa-dart-challenge",
  storageBucket: "bursa-dart-challenge.firebasestorage.app",
  messagingSenderId: "601796841343",
  appId: "1:601796841343:web:bdde88f976cf803ed5d44a"
};

// Wait for Firebase SDKs to be ready
function initFirebase() {
  if (typeof firebase === 'undefined') {
    document.getElementById('live-status').textContent = '❌ Firebase yüklenemedi';
    document.getElementById('live-status').className = 'offline-badge';
    console.error('Firebase SDK yüklenemedi. İnternet bağlantısını kontrol edin.');
    return;
  }
  try {
    firebase.initializeApp(firebaseConfig);
    window._db = firebase.database();
    startListening();
  } catch(e) {
    console.error('Firebase başlatma hatası:', e);
    document.getElementById('live-status').textContent = '❌ Bağlantı hatası';
  }
}

let _data = null;
let _currentTab = 'groups';

function switchTab(t) {
  _currentTab = t;
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + t).classList.add('active');
  document.getElementById('view-' + t).classList.add('active');
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Listen for real-time updates ──
function startListening() {
  window._db.ref('tournament').on('value', function(snap) {
  _data = snap.val();
  const badge = document.getElementById('live-status');
  if (_data) {
    badge.className = 'live-badge';
    badge.textContent = '🔴 CANLI';
    renderAll(_data);
  } else {
    badge.className = 'offline-badge';
    badge.textContent = '⏳ Yayın yok';
  }
  });
}

function renderAll(d) {
  renderGroups(d);
  renderBracket(d);
  renderStats(d);
}

/* ── GROUPS ── */
function renderGroups(d) {
  const el = document.getElementById('groups-content');
  if (!d.groups || !d.groups.length) {
    el.innerHTML = '<div class="waiting"><div class="icon">⏳</div><p>Gruplar henüz oluşturulmadı</p></div>';
    return;
  }
  const adv = d.config ? (d.config.advancePerGroup || 1) : 1;
  let html = '<div class="groups-grid">';
  d.groups.forEach(function(g) {
    // Build standings
    const st = {};
    (g.players || []).forEach(function(p) {
      st[p] = {p:p,w:0,l:0,lw:0,ll:0};
    });
    (g.matches || []).forEach(function(m) {
      if (!m.winner) return;
      if (st[m.player1]) { if(m.winner===m.player1){st[m.player1].w++;st[m.player1].lw+=m.score1||0;st[m.player1].ll+=m.score2||0;}else{st[m.player1].l++;st[m.player1].lw+=m.score1||0;st[m.player1].ll+=m.score2||0;} }
      if (st[m.player2]) { if(m.winner===m.player2){st[m.player2].w++;st[m.player2].lw+=m.score2||0;st[m.player2].ll+=m.score1||0;}else{st[m.player2].l++;st[m.player2].lw+=m.score2||0;st[m.player2].ll+=m.score1||0;} }
    });
    const sorted = Object.values(st).sort(function(a,b){ return b.w!==a.w?b.w-a.w:b.lw!==a.lw?b.lw-a.lw:0; });
    const total = (g.matches||[]).length;
    const played = (g.matches||[]).filter(function(m){return m.winner;}).length;

    html += '<div class="card">';
    html += '<div class="card-header"><div class="card-title">' + esc(g.name) + '</div><span style="font-size:.7rem;color:var(--text2)">' + played + '/' + total + ' maç</span></div>';
    // Standings
    html += '<table class="standings-table"><thead><tr><th>#</th><th>Oyuncu</th><th>G</th><th>M</th><th>A.L</th><th>V.L</th></tr></thead><tbody>';
    sorted.forEach(function(s, i) {
      const cls = i < adv ? ' class="advancing"' : '';
      html += '<tr' + cls + '><td>' + (i+1) + '</td><td>' + esc(s.p) + '</td><td>' + s.w + '</td><td>' + s.l + '</td><td>' + s.lw + '</td><td>' + s.ll + '</td></tr>';
    });
    html += '</tbody></table>';
    // Matches
    html += '<div style="border-top:1px solid var(--border)">';
    (g.matches || []).forEach(function(m) {
      const done = !!m.winner;
      const live = m.active;
      const dot = '<span class="status-dot ' + (done?'done':live?'live':'') + '"></span>';
      const score = done ? ('<span class="match-score done">' + m.score1 + ' – ' + m.score2 + '</span>') :
                           '<span class="match-score pending">vs</span>';
      html += '<div class="match-row">' + dot +
        '<span class="p1">' + esc(m.player1||'?') + '</span>' +
        score +
        '<span class="p2">' + esc(m.player2||'?') + '</span>' +
        '</div>';
    });
    html += '</div></div>';
  });
  html += '</div>';
  el.innerHTML = html;
}

/* ── BRACKET ── */
function renderBracket(d) {
  const el = document.getElementById('bracket-content');
  if (!d.bracket) {
    el.innerHTML = '<div class="waiting"><div class="icon">⏳</div><p>Turnuva henüz başlamadı</p></div>';
    return;
  }
  let html = '';
  if (d.champion) {
    html += '<div class="champ-banner">🏆 ŞAMPİYON<div class="champ-name">' + esc(d.champion) + '</div></div>';
  }
  const br = d.bracket;
  if (br.winners) {
    const format = d.config && d.config.tournamentType === 'double' ? 'Çift Eleme' : 'Tek Eleme';
    html += '<div style="margin-bottom:.5rem;font-size:.75rem;color:var(--text2)">' + format + '</div>';
    html += '<div class="bracket-wrap"><div class="bracket">';
    // Winners bracket
    br.winners.forEach(function(round, ri) {
      const rn = getRoundName(round.length, br.winners.length, ri, false);
      html += '<div class="round-col"><div class="round-label">' + rn + '</div>';
      round.forEach(function(m) { html += renderBracketMatch(m); });
      html += '</div>';
    });
    // Losers bracket
    if (br.losers && br.losers.length) {
      html += '<div style="width:2px;background:var(--border);align-self:stretch;margin:0 .5rem"></div>';
      br.losers.forEach(function(round, ri) {
        html += '<div class="round-col"><div class="round-label" style="color:var(--accent3)">K' + (ri+1) + '</div>';
        round.forEach(function(m) { html += renderBracketMatch(m); });
        html += '</div>';
      });
    }
    // Grand final
    if (br.grandFinal) {
      html += '<div class="round-col"><div class="round-label">Final</div>' + renderBracketMatch(br.grandFinal) + '</div>';
    }
    if (br.grandFinalReset) {
      html += '<div class="round-col"><div class="round-label">Reset</div>' + renderBracketMatch(br.grandFinalReset) + '</div>';
    }
    if (br.thirdPlace) {
      html += '<div class="round-col"><div class="round-label" style="color:var(--text2)">3.lük</div>' + renderBracketMatch(br.thirdPlace) + '</div>';
    }
    html += '</div></div>';
  }
  el.innerHTML = html;
}

function renderBracketMatch(m) {
  if (!m) return '';
  const p1 = m.player1 || '?', p2 = m.player2 || '?';
  const w = m.winner;
  const isBye = p1 === 'BYE' || p2 === 'BYE';
  if (isBye) return '';
  const live = m.active;
  const done = !!w;
  const statusTxt = done ? '✔ Bitti' : live ? '⚡ Oynanıyor' : '—';
  const statusClr = done ? 'var(--green)' : live ? 'var(--yellow)' : 'var(--text2)';
  return '<div class="bm">' +
    '<div class="bm-player ' + (w===p1?'winner':'') + '"><span class="seed"></span>' + esc(p1) + (done&&w===p1?' <span style="color:var(--accent);font-size:.65rem">▶</span>':'') + '</div>' +
    '<div class="bm-divider"></div>' +
    '<div class="bm-player ' + (w===p2?'winner':'') + '"><span class="seed"></span>' + esc(p2) + (done&&w===p2?' <span style="color:var(--accent);font-size:.65rem">▶</span>':'') + '</div>' +
    '<div class="bm-status" style="color:' + statusClr + '">' + statusTxt + (done?' · '+m.score1+'-'+m.score2:'') + '</div>' +
    '</div>';
}

function getRoundName(matchCount, totalRounds, ri, isLosers) {
  const rFrom = totalRounds - ri;
  if (rFrom === 1) return 'Final';
  if (rFrom === 2) return 'Yarı Final';
  if (rFrom === 3) return 'Çeyrek Final';
  return 'Tur ' + (ri + 1);
}

/* ── STATS ── */
function renderStats(d) {
  const el = document.getElementById('stats-content');
  const players = d.players || [];
  const ps = d.playerStats || {};
  if (!players.length) {
    el.innerHTML = '<div class="waiting"><div class="icon">📊</div><p>İstatistik yok</p></div>';
    return;
  }

  // Compute from group matches
  const gm = [];
  (d.groups || []).forEach(function(g) {
    (g.matches || []).forEach(function(m) { if (m.winner) gm.push(m); });
  });

  const st = {};
  players.forEach(function(p) { st[p] = {p:p,w:0,l:0,lw:0,ll:0,ok:0,okCount:0,s180:0,ho:0}; });
  gm.forEach(function(m) {
    const s1 = st[m.player1], s2 = st[m.player2];
    if (!s1||!s2) return;
    if (m.winner===m.player1){s1.w++;s2.l++;}else{s2.w++;s1.l++;}
    s1.lw+=m.score1||0; s1.ll+=m.score2||0;
    s2.lw+=m.score2||0; s2.ll+=m.score1||0;
    (m.legs||[]).forEach(function(leg) {
      if (leg.p1Stats) { if(leg.p1Stats.okSayisi>0){s1.ok+=leg.p1Stats.okSayisi;s1.okCount++;} s1.s180+=leg.p1Stats.s180||0; if(leg.p1Stats.highOut>0)s1.ho=Math.max(s1.ho,leg.p1Stats.highOut); }
      if (leg.p2Stats) { if(leg.p2Stats.okSayisi>0){s2.ok+=leg.p2Stats.okSayisi;s2.okCount++;} s2.s180+=leg.p2Stats.s180||0; if(leg.p2Stats.highOut>0)s2.ho=Math.max(s2.ho,leg.p2Stats.highOut); }
    });
  });

  const sorted = Object.values(st).sort(function(a,b){ return b.w!==a.w?b.w-a.w:b.lw-a.lw; });

  let html = '<div class="card"><div class="card-header"><div class="card-title">📊 Grup İstatistikleri</div></div>';
  html += '<div style="overflow-x:auto"><table class="stats-table"><thead><tr>';
  html += '<th>#</th><th>Oyuncu</th><th>G</th><th>M</th><th>A.L</th><th>V.L</th><th>Ok Ort.</th><th>180</th><th>H.Out</th>';
  html += '</tr></thead><tbody>';
  sorted.forEach(function(s, i) {
    const avg = s.okCount > 0 ? ((s.okCount * 501 - 0) / s.ok * 3).toFixed(2) : '—';
    html += '<tr><td style="color:var(--accent)">' + (i+1) + '</td><td style="font-weight:bold">' + esc(s.p) + '</td>' +
      '<td>' + s.w + '</td><td>' + s.l + '</td><td>' + s.lw + '</td><td>' + s.ll + '</td>' +
      '<td style="color:var(--accent)">' + avg + '</td>' +
      '<td style="color:var(--accent3)">' + (s.s180||'—') + '</td>' +
      '<td style="color:var(--accent3)">' + (s.ho||'—') + '</td></tr>';
  });
  html += '</tbody></table></div></div>';
  el.innerHTML = html;
}
window.addEventListener("load", initFirebase);
</script>
</body>
</html>
